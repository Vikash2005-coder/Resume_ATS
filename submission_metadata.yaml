# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Cursor"

ai_usage_summary: |
  Used Claude to outline the system architecture, design the scoring weights,
  and write code for the honeypot detection. No candidate data was shared with 
  external APIs.

# ============================================================================
# Approach summary (methodology)
# ============================================================================
methodology_summary: |
  Hybrid retrieval ranking engine combining offline dense vector embeddings (generated
  with local sentence-transformers all-MiniLM-L6-v2) and concept synonym mappings
  for skills. Candidate matching is scored using a hierarchical 6-component formula:
  Career Semantics (25%), Skills Match (20%), Title Fit (15%), Stated Experience
  (15%), Behavioral Engagement (15%), and Availability (10%). Incorporates strict
  expert-skill duration checking, experience validation, and timeline anomaly detection
  to disqualify honeypots (Score = 0.0). Features a keyword-stuffing detector
  (low description semantics + high skill density = 50% penalty). Ties are resolved
  alphanumerically. Runs in under 90s on CPU.

# ============================================================================
# Declarations
# ============================================================================
declarations:
